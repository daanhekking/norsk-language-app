    transition:left .15s cubic-bezier(.3,.7,.4,1),width .15s}
  .twk-seg.dragging .twk-seg-thumb{transition:none}
  .twk-seg button{appearance:none;position:relative;z-index:1;flex:1;border:0;

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ open, onClose, title = 'Settings', children }) {
  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div className="twk-panel">
        <div className="twk-hd">
          <b>{title}</b>
          <button className="twk-x" aria-label="Close settings" onClick={onClose}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return (<><div className="twk-sect">{label}</div>{children}</>);
}

function TweakRow({ label, children }) {
  return (
    <div className="twk-row">
      <div className="twk-lbl"><span>{label}</span></div>
      {children}
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const valueRef = React.useRef(value);
  valueRef.current = value;
  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };
  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { if (!trackRef.current) return; const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown} className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (<button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>))}
      </div>
    </TweakRow>
  );
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getChoices(correct, allItems, field) {
  const wrongs = shuffle(allItems.filter(v => v[field] !== correct)).slice(0, 3).map(v => v[field]);
  return shuffle([correct, ...wrongs]);
}

// ─── VOCAB SESSION ────────────────────────────────────────────────────────────
function VocabSession({ t, vocab, onBack, onAgain, exerciseMix, d, reversed }) {
  const [cards] = React.useState(() => shuffle(vocab));
  const [idx, setIdx] = React.useState(0);
  const [flipped, setFlipped] = React.useState(false);
  const [selected, setSelected] = React.useState(null);
  const [result, setResult] = React.useState(null);
  const [done, setDone] = React.useState(false);
  const [score, setScore] = React.useState(0);
  const [animKey, setAnimKey] = React.useState(0);
  const [shakeKey, setShakeKey] = React.useState(0);

  const cardTypeMap = { cycle: [0, 1, 2], write: [1, 2, 2], reveal: [0, 0, 0] };
  const seq = cardTypeMap[exerciseMix] || cardTypeMap.cycle;
  const cardType = seq[idx % seq.length];
  const card = cards[idx];
  const front       = reversed ? card.norwegian : card.english;
  const back        = reversed ? card.english   : card.norwegian;
  const choiceField = reversed ? 'english'      : 'norwegian';
  const frontLabel  = reversed ? 'Norsk'        : 'English';
  const backLabel   = reversed ? 'English'      : 'Norsk';
  const writePrompt = reversed ? 'Write in English' : 'Write in Norwegian';
  const writePlaceholder = reversed ? 'Type the English word…' : 'Type the Norwegian word…';

  const choices = React.useMemo(() => getChoices(back, vocab, choiceField), [idx]);

  function advance(correct) {
    if (correct) setScore(s => s + 1);
    setTimeout(() => {
      if (idx + 1 >= cards.length) { setDone(true); return; }
      setIdx(i => i + 1);
      setFlipped(false);
      setSelected(null);
      setResult(null);
      setAnimKey(k => k + 1);
    }, 700);
  }

  function handleChoice(choice) {
    if (selected) return;
    setSelected(choice);
    const correct = choice === back;
    setResult(correct ? 'correct' : 'wrong');
    if (!correct) setShakeKey(k => k + 1);
    advance(correct);
  }

  const modeLabel = ['Card reveal', 'Multiple choice', 'Write it'][cardType];

  if (done) return <SessionEnd t={t} score={score} total={cards.length} onBack={onBack} onAgain={onAgain} label="Words correct" />;

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {/* Header */}
      <div style={{ padding: '8px 20px 10px', flexShrink: 0 }}>
        <BackButton t={t} onPress={onBack} />
        <div style={{ marginTop: 8 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 7 }}>
            <span style={{ fontSize: 12, color: t.textSub }}>{modeLabel}</span>
            <span style={{ fontSize: 12, color: t.textSub }}>{idx + 1} / {cards.length}</span>
          </div>
          <ProgressBar current={idx + 1} total={cards.length} t={t} />
        </div>
      </div>

      {/* Scrollable content */}
      <div key={animKey} className="scroll-area" style={{ padding: '8px 20px 24px', display: 'flex', flexDirection: 'column', gap: 12, animation: 'fadeUp .25s ease' }}>
        {cardType === 0 && <FlipCard t={t} front={front} back={back} frontLabel={frontLabel} backLabel={backLabel} flipped={flipped} onFlip={() => setFlipped(true)} hint={card.hint} onGotIt={() => advance(true)} onRepeat={() => advance(false)} d={d} />}
        {cardType === 1 && <MultipleChoice t={t} front={front} frontLabel={frontLabel} backLabel={backLabel} choices={choices} correct={back} selected={selected} result={result} shakeKey={shakeKey} hint={card.hint} onChoice={handleChoice} d={d} />}
        {cardType === 2 && <FreeText t={t} front={front} frontLabel={frontLabel} correct={back} hint={card.hint} onAdvance={advance} d={d} promptLabel={writePrompt} placeholder={writePlaceholder} />}
      </div>
    </div>
  );
}

function FlipCard({ t, front, back, frontLabel, backLabel, flipped, onFlip, hint, onGotIt, onRepeat, d }) {

function MultipleChoice({ t, front, frontLabel, backLabel, choices, correct, selected, result, shakeKey, hint, onChoice, d }) {
  const dp = d || DENSITY.comfortable;
  return (
    <>
      <div style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 20, padding: dp.cardPadLg, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>

function FreeText({ t, front, frontLabel = 'English', correct, hint, onAdvance, d, promptLabel = 'Write in Norwegian', placeholder = 'Type the Norwegian word…' }) {
  const dp = d || DENSITY.comfortable;
  const [value, setValue] = React.useState('');
  const [result, setResult] = React.useState(null);
  const inputRef = React.useRef(null);

  React.useEffect(() => {
    const id = setTimeout(() => inputRef.current?.focus(), 100);
    return () => clearTimeout(id);
  }, []);

  function check() {
    if (!value.trim() || result) return;
    const ok = value.trim().toLowerCase() === correct.toLowerCase();
    setResult(ok ? 'correct' : 'wrong');
    setTimeout(() => onAdvance(ok), 900);
  }

  function handleKey(e) { if (e.key === 'Enter') check(); }

  const borderColor = result === 'correct' ? t.correct : result === 'wrong' ? t.wrong : value ? t.accent : t.border;
  const bg          = result === 'correct' ? t.correctSoft : result === 'wrong' ? t.wrongSoft : t.surface;

  return (
    <>
      <div style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 20, padding: dp.cardPad, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8 }}>
        <p style={{ fontSize: 11, color: t.textSub, fontWeight: 600, letterSpacing: '.08em', textTransform: 'uppercase' }}>{frontLabel}</p>
        <p style={{ fontFamily: 'IBM Plex Mono, monospace', fontSize: dp.fontSize, fontWeight: 500, color: t.text, textAlign: 'center' }}>{front}</p>
        {hint && <span style={{ fontSize: 11, color: t.textSub }}>{hint}</span>}
      </div>

      <p style={{ fontSize: 11, color: t.textSub, fontWeight: 600, letterSpacing: '.08em', textTransform: 'uppercase', textAlign: 'center' }}>{promptLabel}</p>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        <input
          ref={inputRef}
          value={value}
          onChange={e => setValue(e.target.value)}
          onKeyDown={handleKey}
          disabled={!!result}
          placeholder={placeholder}
          style={{
            width: '100%', padding: '14px 16px', height: 52,
            background: bg, border: `1.5px solid ${borderColor}`, borderRadius: 14,
            fontFamily: 'IBM Plex Mono, monospace', fontSize: 16, color: t.text,
            outline: 'none', transition: 'border-color .2s, background .2s',
            caretColor: t.accent,
          }}
        />
        {!result && (
          <button
            onClick={check}
            disabled={!value.trim()}
            style={{
              width: '100%', padding: '14px', height: 52,
              background: value.trim() ? t.accent : t.surfaceAlt,
              border: 'none', borderRadius: 14,
              cursor: value.trim() ? 'pointer' : 'default',
              fontFamily: 'Sora, sans-serif', fontSize: 14, fontWeight: 600,
              color: value.trim() ? '#fff' : t.textSub,
              transition: 'background .2s',
            }}
          >Check</button>
        )}
        {result && (
          <div style={{ animation: 'fadeUp .2s ease', background: result === 'correct' ? t.correctSoft : t.wrongSoft, border: `1px solid ${result === 'correct' ? t.correct : t.wrong}`, borderRadius: 14, padding: '12px 16px' }}>
            <p style={{ fontSize: 13, fontWeight: 600, color: result === 'correct' ? t.correct : t.wrong }}>
              {result === 'correct' ? 'Riktig! ✓' : `Feil — correct: ${correct}`}
            </p>
          </div>
        )}
      </div>
    </>
  );
}

function VerbSession({ t, verbs, onBack, onAgain }) {
  const questions = React.useMemo(() => {
    const q = [];
    shuffle(verbs).slice(0, 10).forEach(v => {
      const form = VERB_FORMS[Math.floor(Math.random() * VERB_FORMS.length)];
      q.push({ verb: v, form });
    });
    return q;
  }, []);

  const [idx, setIdx] = React.useState(0);
  const [selected, setSelected] = React.useState(null);
  const [result, setResult] = React.useState(null);
  const [done, setDone] = React.useState(false);
  const [score, setScore] = React.useState(0);
  const [animKey, setAnimKey] = React.useState(0);
  const [shakeKey, setShakeKey] = React.useState(0);

  const q = questions[idx];
  const correct = q.verb[q.form.key];

  const choices = React.useMemo(() => getChoices(correct, verbs, q.form.key), [idx]);

  function handleChoice(ch) {
    if (selected) return;
    setSelected(ch);
    const ok = ch === correct;
    setResult(ok ? 'correct' : 'wrong');
    if (!ok) setShakeKey(k => k + 1);
    if (ok) setScore(s => s + 1);
    setTimeout(() => {
      if (idx + 1 >= questions.length) { setDone(true); return; }
      setIdx(i => i + 1);
      setSelected(null);
      setResult(null);
      setAnimKey(k => k + 1);
    }, 700);
  }

  if (done) return <SessionEnd t={t} score={score} total={questions.length} onBack={onBack} onAgain={onAgain} label="Correct answers" />;

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {/* Header */}
      <div style={{ padding: '8px 20px 10px', flexShrink: 0 }}>

          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 7 }}>
            <span style={{ fontSize: 12, color: t.textSub }}>Verb forms</span>
            <span style={{ fontSize: 12, color: t.textSub }}>{idx + 1} / {questions.length}</span>
          </div>
          <ProgressBar current={idx + 1} total={questions.length} t={t} />

      </div>

      {/* Scrollable content */}
      <div key={animKey} className="scroll-area" style={{ padding: '8px 20px 24px', display: 'flex', flexDirection: 'column', gap: 12, animation: 'fadeUp .25s ease' }}>
        <div style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 20, padding: '20px', display: 'flex', flexDirection: 'column', gap: 4 }}>
          <p style={{ fontSize: 11, color: t.textSub, fontWeight: 600, letterSpacing: '.08em', textTransform: 'uppercase' }}>Infinitiv</p>
          <p style={{ fontFamily: 'IBM Plex Mono, monospace', fontSize: 26, fontWeight: 500, color: t.text }}>{q.verb.infinitiv}</p>
          <p style={{ fontSize: 13, color: t.textSub }}>{q.verb.english}</p>
        </div>

        <div style={{ background: t.accentSoft, border: `1.5px solid ${t.accent}`, borderRadius: 14, padding: '12px 16px' }}>
          <p style={{ fontSize: 13, fontWeight: 600, color: t.accent }}>What is the {q.form.label}?</p>
          <p style={{ fontSize: 11, color: t.accent, opacity: .7, marginTop: 2 }}>{q.form.sublabel}</p>
        </div>

        <div key={shakeKey} style={{ display: 'flex', flexDirection: 'column', gap: 8, animation: result === 'wrong' ? 'shake .4s ease' : 'none' }}>
          {choices.map(ch => {
            let bg = t.surface, border = t.border, color = t.text;
            if (selected === ch) {
              bg     = ch === correct ? t.correctSoft : t.wrongSoft;
              border = ch === correct ? t.correct     : t.wrong;
              color  = ch === correct ? t.correct     : t.wrong;
            } else if (selected && ch === correct) {
              bg = t.correctSoft; border = t.correct; color = t.correct;
            }
            return (
              <button
                key={ch}
                onClick={() => handleChoice(ch)}
                style={{
                  background: bg, border: `1.5px solid ${border}`, borderRadius: 14,
                  padding: '14px 18px', minHeight: 52,
                  cursor: selected ? 'default' : 'pointer',
                  fontFamily: 'IBM Plex Mono, monospace', fontSize: 15, fontWeight: 500,
                  color, textAlign: 'left',
                  transition: 'background .25s, border-color .25s, color .25s',
                  WebkitTapHighlightColor: 'transparent',
                }}
              >{ch}</button>
            );
          })}
        </div>

        {selected && (
          <div style={{ animation: 'fadeUp .2s ease', background: result === 'correct' ? t.correctSoft : t.wrongSoft, border: `1px solid ${result === 'correct' ? t.correct : t.wrong}`, borderRadius: 14, padding: '12px 16px' }}>

              {result === 'correct' ? 'Riktig! ✓' : `Feil — correct: ${correct}`}

          </div>
        )}
      </div>
    </div>
  );
}

// ─── CATEGORY SORT SESSION ────────────────────────────────────────────────────
function CategorySortSession({ t, vocab, onBack, onAgain }) {
  const questions = React.useMemo(() => {
    const counts = {};
    vocab.forEach(v => { counts[v.hint] = (counts[v.hint] || 0) + 1; });
    const cats = Object.keys(counts).filter(k => k).sort((a, b) => counts[b] - counts[a]).slice(0, 3);
    if (cats.length < 2) return null;
    const eligible = vocab.filter(v => cats.includes(v.hint));
    return shuffle(eligible).slice(0, Math.min(12, eligible.length));
  }, []);

  const [idx, setIdx] = React.useState(0);
  const [selected, setSelected] = React.useState(null);
  const [result, setResult] = React.useState(null);
  const [score, setScore] = React.useState(0);
  const [done, setDone] = React.useState(false);
  const [animKey, setAnimKey] = React.useState(0);

  if (!questions) {
    return (
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '0 28px', gap: 16 }}>
        <p style={{ fontSize: 15, color: t.textSub, textAlign: 'center' }}>Not enough categories in your vocabulary to run this exercise.</p>
        <button onClick={onBack} style={{ padding: '14px 28px', background: t.accent, border: 'none', borderRadius: 14, cursor: 'pointer', fontFamily: 'Sora, sans-serif', fontSize: 14, fontWeight: 600, color: '#fff' }}>Back</button>
      </div>
    );
  }

  if (done) return <SessionEnd t={t} score={score} total={questions.length} onBack={onBack} onAgain={onAgain} label="Correctly sorted" />;

  const categories = [...new Set(questions.map(q => q.hint))].sort();
  const card = questions[idx];

  function handlePick(cat) {
    if (selected) return;
    setSelected(cat);
    const ok = cat === card.hint;
    setResult(ok ? 'correct' : 'wrong');
    if (ok) setScore(s => s + 1);
    setTimeout(() => {
      if (idx + 1 >= questions.length) { setDone(true); return; }
      setIdx(i => i + 1);
      setSelected(null);
      setResult(null);
      setAnimKey(k => k + 1);
    }, 700);
  }

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <div style={{ padding: '8px 20px 10px', flexShrink: 0 }}>
        <BackButton t={t} onPress={onBack} />
        <div style={{ marginTop: 8 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 7 }}>
            <span style={{ fontSize: 12, color: t.textSub }}>Category sort</span>
            <span style={{ fontSize: 12, color: t.textSub }}>{idx + 1} / {questions.length}</span>
          </div>
          <ProgressBar current={idx + 1} total={questions.length} t={t} />
        </div>
      </div>

      <div key={animKey} className="scroll-area" style={{ padding: '8px 20px 24px', display: 'flex', flexDirection: 'column', gap: 12, animation: 'fadeUp .25s ease' }}>
        <div style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 20, padding: '28px 24px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
          <p style={{ fontSize: 11, color: t.textSub, fontWeight: 600, letterSpacing: '.08em', textTransform: 'uppercase' }}>Norsk</p>
          <p style={{ fontFamily: 'IBM Plex Mono, monospace', fontSize: 28, fontWeight: 500, color: t.text, textAlign: 'center' }}>{card.norwegian}</p>
          <p style={{ fontSize: 13, color: t.textSub }}>{card.english}</p>
        </div>

        <p style={{ fontSize: 11, color: t.textSub, fontWeight: 600, letterSpacing: '.08em', textTransform: 'uppercase', textAlign: 'center' }}>What category?</p>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {categories.map(cat => {
            let bg = t.surface, border = t.border, color = t.text;
            if (selected === cat) {
              bg = cat === card.hint ? t.correctSoft : t.wrongSoft;
              border = cat === card.hint ? t.correct : t.wrong;
              color = cat === card.hint ? t.correct : t.wrong;
            } else if (selected && cat === card.hint) {
              bg = t.correctSoft; border = t.correct; color = t.correct;
            }
            return (
              <button key={cat} onClick={() => handlePick(cat)}
                style={{
                  background: bg, border: `1.5px solid ${border}`, borderRadius: 14,
                  padding: '16px 18px', minHeight: 52,
                  cursor: selected ? 'default' : 'pointer',
                  fontFamily: 'IBM Plex Mono, monospace', fontSize: 16, fontWeight: 500,
                  color, textAlign: 'center',
                  transition: 'background .25s, border-color .25s, color .25s',
                  WebkitTapHighlightColor: 'transparent',
                }}
              >{cat}</button>
            );
          })}
        </div>

        {selected && (
          <div style={{ animation: 'fadeUp .2s ease', background: result === 'correct' ? t.correctSoft : t.wrongSoft, border: `1px solid ${result === 'correct' ? t.correct : t.wrong}`, borderRadius: 14, padding: '12px 16px' }}>
            <p style={{ fontSize: 13, fontWeight: 600, color: result === 'correct' ? t.correct : t.wrong }}>
              {result === 'correct' ? 'Riktig! ✓' : `Feil — it's ${card.hint}`}
            </p>
          </div>
        )}
      </div>
    </div>
  );
}

        <div style={{ background: t.accentSoft, border: `1.5px solid ${t.accent}`, borderRadius: 14, padding: '12px 16px' }}>
          <p style={{ fontSize: 13, fontWeight: 600, color: t.accent }}>Type the {q.form.label}</p>
          <p style={{ fontSize: 11, color: t.accent, opacity: .7, marginTop: 2 }}>{q.form.sublabel}</p>
        </div>

        <VerbInputField t={t} correct={q.verb[q.form.key]} onAdvance={advance} />
      </div>
    </div>
  );
}

// ─── FULL VERB TABLE SESSION ──────────────────────────────────────────────────
function VerbTableSession({ t, verbs, onBack, onAgain }) {
  const steps = React.useMemo(() => {
    const out = [];
    shuffle(verbs).slice(0, 5).forEach(v => {
      VERB_FORMS.forEach(form => out.push({ verb: v, form }));
    });
    return out;
  }, []);

  const [idx, setIdx] = React.useState(0);
  const [score, setScore] = React.useState(0);
  const [done, setDone] = React.useState(false);
  const [animKey, setAnimKey] = React.useState(0);

  function advance(correct) {
    if (correct) setScore(s => s + 1);
    setTimeout(() => {
      if (idx + 1 >= steps.length) { setDone(true); return; }
      setIdx(i => i + 1);
      setAnimKey(k => k + 1);
    }, 900);
  }

  if (done) return <SessionEnd t={t} score={score} total={steps.length} onBack={onBack} onAgain={onAgain} label="Forms correct" />;

  const s = steps[idx];
  const verbIdx = Math.floor(idx / VERB_FORMS.length) + 1;
  const verbTotal = Math.ceil(steps.length / VERB_FORMS.length);

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <div style={{ padding: '8px 20px 10px', flexShrink: 0 }}>
        <BackButton t={t} onPress={onBack} />
        <div style={{ marginTop: 8 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 7 }}>
            <span style={{ fontSize: 12, color: t.textSub }}>Verb {verbIdx} of {verbTotal} · {s.form.label}</span>
            <span style={{ fontSize: 12, color: t.textSub }}>{idx + 1} / {steps.length}</span>
          </div>
          <ProgressBar current={idx + 1} total={steps.length} t={t} />
        </div>
      </div>

      <div key={animKey} className="scroll-area" style={{ padding: '8px 20px 24px', display: 'flex', flexDirection: 'column', gap: 12, animation: 'fadeUp .25s ease' }}>
        <div style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 20, padding: '20px', display: 'flex', flexDirection: 'column', gap: 4 }}>
          <p style={{ fontSize: 11, color: t.textSub, fontWeight: 600, letterSpacing: '.08em', textTransform: 'uppercase' }}>Infinitiv</p>
          <p style={{ fontFamily: 'IBM Plex Mono, monospace', fontSize: 26, fontWeight: 500, color: t.text }}>{s.verb.infinitiv}</p>
          <p style={{ fontSize: 13, color: t.textSub }}>{s.verb.english}</p>
        </div>

        <div style={{ background: t.accentSoft, border: `1.5px solid ${t.accent}`, borderRadius: 14, padding: '12px 16px' }}>
          <p style={{ fontSize: 13, fontWeight: 600, color: t.accent }}>Type the {s.form.label}</p>
          <p style={{ fontSize: 11, color: t.accent, opacity: .7, marginTop: 2 }}>{s.form.sublabel}</p>
        </div>

        <VerbInputField t={t} correct={s.verb[s.form.key]} onAdvance={advance} />
      </div>
    </div>
  );
}

// ─── VERB REVERSE SESSION ─────────────────────────────────────────────────────
function VerbReverseSession({ t, verbs, onBack, onAgain }) {
  const questions = React.useMemo(() => {
    const q = [];
    shuffle(verbs).slice(0, 10).forEach(v => {
      const form = VERB_FORMS[Math.floor(Math.random() * VERB_FORMS.length)];
      q.push({ verb: v, form, conjugated: v[form.key] });
    });
    return q;
  }, []);

  const [idx, setIdx] = React.useState(0);
  const [selected, setSelected] = React.useState(null);
  const [result, setResult] = React.useState(null);
  const [score, setScore] = React.useState(0);
  const [done, setDone] = React.useState(false);
  const [animKey, setAnimKey] = React.useState(0);
  const [shakeKey, setShakeKey] = React.useState(0);

  const q = questions[idx];
  const correct = q.verb.infinitiv;
  const choices = React.useMemo(() => getChoices(correct, verbs, 'infinitiv'), [idx]);

  function handleChoice(ch) {
    if (selected) return;
    setSelected(ch);
    const ok = ch === correct;
    setResult(ok ? 'correct' : 'wrong');
    if (!ok) setShakeKey(k => k + 1);
    if (ok) setScore(s => s + 1);
    setTimeout(() => {
      if (idx + 1 >= questions.length) { setDone(true); return; }
      setIdx(i => i + 1);
      setSelected(null);
      setResult(null);
      setAnimKey(k => k + 1);
    }, 700);
  }

  if (done) return <SessionEnd t={t} score={score} total={questions.length} onBack={onBack} onAgain={onAgain} label="Correct answers" />;

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <div style={{ padding: '8px 20px 10px', flexShrink: 0 }}>
        <BackButton t={t} onPress={onBack} />
        <div style={{ marginTop: 8 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 7 }}>
            <span style={{ fontSize: 12, color: t.textSub }}>Reverse conjugation</span>
            <span style={{ fontSize: 12, color: t.textSub }}>{idx + 1} / {questions.length}</span>
          </div>
          <ProgressBar current={idx + 1} total={questions.length} t={t} />
        </div>
      </div>

      <div key={animKey} className="scroll-area" style={{ padding: '8px 20px 24px', display: 'flex', flexDirection: 'column', gap: 12, animation: 'fadeUp .25s ease' }}>
        <div style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 20, padding: '28px 24px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
          <p style={{ fontSize: 11, color: t.textSub, fontWeight: 600, letterSpacing: '.08em', textTransform: 'uppercase' }}>{q.form.label} · {q.form.sublabel}</p>
          <p style={{ fontFamily: 'IBM Plex Mono, monospace', fontSize: 32, fontWeight: 500, color: t.text, textAlign: 'center' }}>{q.conjugated}</p>
        </div>

        <p style={{ fontSize: 11, color: t.textSub, fontWeight: 600, letterSpacing: '.08em', textTransform: 'uppercase', textAlign: 'center' }}>Which verb is this?</p>

        <div key={shakeKey} style={{ display: 'flex', flexDirection: 'column', gap: 8, animation: result === 'wrong' ? 'shake .4s ease' : 'none' }}>
          {choices.map(ch => {
            let bg = t.surface, border = t.border, color = t.text;
            if (selected === ch) {
              bg = ch === correct ? t.correctSoft : t.wrongSoft;
              border = ch === correct ? t.correct : t.wrong;
              color = ch === correct ? t.correct : t.wrong;
            } else if (selected && ch === correct) {
              bg = t.correctSoft; border = t.correct; color = t.correct;
            }
            return (
              <button key={ch} onClick={() => handleChoice(ch)}
                style={{
                  background: bg, border: `1.5px solid ${border}`, borderRadius: 14,
                  padding: '14px 18px', minHeight: 52,
                  cursor: selected ? 'default' : 'pointer',
                  fontFamily: 'IBM Plex Mono, monospace', fontSize: 15, fontWeight: 500,
                  color, textAlign: 'left',
                  transition: 'background .25s, border-color .25s, color .25s',
                  WebkitTapHighlightColor: 'transparent',
                }}
              >{ch}</button>
            );
          })}
        </div>

        {selected && (
          <div style={{ animation: 'fadeUp .2s ease', background: result === 'correct' ? t.correctSoft : t.wrongSoft, border: `1px solid ${result === 'correct' ? t.correct : t.wrong}`, borderRadius: 14, padding: '12px 16px' }}>
            <p style={{ fontSize: 13, fontWeight: 600, color: result === 'correct' ? t.correct : t.wrong }}>
              {result === 'correct' ? 'Riktig! ✓' : `Feil — correct: ${correct}`}
            </p>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── SHARED VERB INPUT ────────────────────────────────────────────────────────
function VerbInputField({ t, correct, onAdvance }) {
  const [value, setValue] = React.useState('');
  const [result, setResult] = React.useState(null);
  const inputRef = React.useRef(null);

  React.useEffect(() => {
    const id = setTimeout(() => inputRef.current?.focus(), 100);
    return () => clearTimeout(id);
  }, []);

  function check() {
    if (!value.trim() || result) return;
    const ok = value.trim().toLowerCase() === correct.toLowerCase();
    setResult(ok ? 'correct' : 'wrong');
    setTimeout(() => onAdvance(ok), 900);
  }

  const borderColor = result === 'correct' ? t.correct : result === 'wrong' ? t.wrong : value ? t.accent : t.border;
  const bg = result === 'correct' ? t.correctSoft : result === 'wrong' ? t.wrongSoft : t.surface;

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
      <input
        ref={inputRef}
        value={value}
        onChange={e => setValue(e.target.value)}
        onKeyDown={e => e.key === 'Enter' && check()}
        disabled={!!result}
        placeholder="Type the conjugated form…"
        style={{
          width: '100%', padding: '14px 16px', height: 52,
          background: bg, border: `1.5px solid ${borderColor}`, borderRadius: 14,
          fontFamily: 'IBM Plex Mono, monospace', fontSize: 16, color: t.text,
          outline: 'none', transition: 'border-color .2s, background .2s',
          caretColor: t.accent,
        }}
      />
      {!result && (
        <button onClick={check} disabled={!value.trim()}
          style={{
            width: '100%', padding: '14px', height: 52,
            background: value.trim() ? t.accent : t.surfaceAlt,
            border: 'none', borderRadius: 14,
            cursor: value.trim() ? 'pointer' : 'default',
            fontFamily: 'Sora, sans-serif', fontSize: 14, fontWeight: 600,
            color: value.trim() ? '#fff' : t.textSub,
            transition: 'background .2s',
          }}
        >Check</button>
      )}
      {result && (
        <div style={{ animation: 'fadeUp .2s ease', background: result === 'correct' ? t.correctSoft : t.wrongSoft, border: `1px solid ${result === 'correct' ? t.correct : t.wrong}`, borderRadius: 14, padding: '12px 16px' }}>
          <p style={{ fontSize: 13, fontWeight: 600, color: result === 'correct' ? t.correct : t.wrong }}>
            {result === 'correct' ? 'Riktig! ✓' : `Feil — correct: ${correct}`}
          </p>
        </div>
      )}
    </div>
  );
}

// ─── SESSION END ──────────────────────────────────────────────────────────────
function SessionEnd({ t, score, total, onBack, onAgain, label }) {
  const pct = Math.round((score / total) * 100);
  const msg = pct >= 80 ? 'Bra jobbet! 🎉' : pct >= 50 ? 'Ikke verst!' : 'Fortsett å øve!';
  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '0 28px', gap: 24, animation: 'fadeUp .4s ease', height: '100%' }}>
      <div style={{ textAlign: 'center' }}>
        <p style={{ fontFamily: 'IBM Plex Mono, monospace', fontSize: 72, fontWeight: 500, color: t.accent, lineHeight: 1 }}>{pct}%</p>
        <p style={{ fontSize: 22, fontWeight: 600, color: t.text, marginTop: 10 }}>{msg}</p>
        <p style={{ fontSize: 13, color: t.textSub, marginTop: 6 }}>{label}: {score} / {total}</p>
      </div>
      <div style={{ display: 'flex', gap: 10, width: '100%' }}>
        <button onClick={onBack} style={{ flex: 1, padding: '15px', minHeight: 52, background: t.surfaceAlt, border: `1px solid ${t.border}`, borderRadius: 14, cursor: 'pointer', fontFamily: 'Sora, sans-serif', fontSize: 14, fontWeight: 500, color: t.text }}>
          Home
        </button>
        <button onClick={onAgain} style={{ flex: 1, padding: '15px', minHeight: 52, background: t.accent, border: 'none', borderRadius: 14, cursor: 'pointer', fontFamily: 'Sora, sans-serif', fontSize: 14, fontWeight: 600, color: '#fff' }}>
          Again
        </button>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
const DENSITY = {
  compact:     { cardPad: '20px 18px', cardPadLg: '20px 18px', fontSize: 22, gap: 8  },
  comfortable: { cardPad: '28px 22px', cardPadLg: '22px 18px', fontSize: 26, gap: 12 },
  spacious:    { cardPad: '36px 26px', cardPadLg: '28px 22px', fontSize: 30, gap: 14 },
};

function NorwegianApp({ t, verbs, vocab, exerciseMix = 'cycle', density = 'comfortable', settingsOpen, onSettingsToggle, tweaks, setTweak }) {
  const [screen, setScreen] = React.useState('home');
  const [sessionKey, setSessionKey] = React.useState(0);
  const d = DENSITY[density] || DENSITY.comfortable;

  const goHome  = () => setScreen('home');
  const restart = () => setSessionKey(k => k + 1);

  const inner = () => {
    if (screen === 'home')         return <HomeScreen         t={t} verbs={verbs} vocab={vocab} onNavigate={setScreen} />;
    if (screen === 'vocab-en-no')  return <VocabSession       key={sessionKey} t={t} vocab={vocab} exerciseMix={exerciseMix} d={d} onBack={goHome} onAgain={restart} />;
    if (screen === 'vocab-no-en')  return <VocabSession       key={sessionKey} t={t} vocab={vocab} exerciseMix={exerciseMix} d={d} onBack={goHome} onAgain={restart} reversed />;
    if (screen === 'spelling-bee') return <SpellingBeeSession key={sessionKey} t={t} vocab={vocab} d={d} onBack={goHome} onAgain={restart} />;
    if (screen === 'category-sort')return <CategorySortSession key={sessionKey} t={t} vocab={vocab} onBack={goHome} onAgain={restart} />;
    if (screen === 'verbs')        return <VerbSession        key={sessionKey} t={t} verbs={verbs} onBack={goHome} onAgain={restart} />;
    if (screen === 'verb-type')    return <VerbTypingSession  key={sessionKey} t={t} verbs={verbs} onBack={goHome} onAgain={restart} />;
    if (screen === 'verb-table')   return <VerbTableSession   key={sessionKey} t={t} verbs={verbs} onBack={goHome} onAgain={restart} />;
    if (screen === 'verb-reverse') return <VerbReverseSession key={sessionKey} t={t} verbs={verbs} onBack={goHome} onAgain={restart} />;
  };

  // Gear button style adapts to current theme
  const gearBg  = t.bg === '#141820' || t.bg.startsWith('#1') /* dark themes */
    ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.08)';
  const gearColor = t.bg === '#141820' || t.bg.startsWith('#1')
    ? 'rgba(255,255,255,0.55)' : 'rgba(0,0,0,0.4)';

  return (
    <div
      className="app-shell"
      style={{ background: t.bg }}
    >
      {/* Main content */}
      <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
        {inner()}
      </div>

      {/* Settings gear — lives inside the shell, above content */}
      <button
        className="settings-btn"
        onClick={onSettingsToggle}
        title="Settings"
        aria-label="Open settings"
        style={{ background: gearBg, color: gearColor }}
      >
        <svg width="15" height="15" viewBox="0 0 20 20" fill="currentColor">
          <path fillRule="evenodd" clipRule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z"/>
        </svg>
      </button>

      {/* Settings panel */}
      <TweaksPanel open={settingsOpen} onClose={onSettingsToggle}>
        <TweakSection label="Theme">
          <TweakRadio value={tweaks.theme} onChange={v => setTweak('theme', v)}
            options={[{ value: 'natt', label: 'Natt' }, { value: 'fjord', label: 'Fjord' }, { value: 'birch', label: 'Birch' }]} />
        </TweakSection>
        <TweakSection label="Exercise Mix">
          <TweakRadio value={tweaks.exerciseMix} onChange={v => setTweak('exerciseMix', v)}
            options={[{ value: 'cycle', label: 'Cycle' }, { value: 'write', label: 'Write' }, { value: 'reveal', label: 'Reveal' }]} />
        </TweakSection>
        <TweakSection label="Card Density">
          <TweakRadio value={tweaks.density} onChange={v => setTweak('density', v)}
            options={[{ value: 'compact', label: 'Compact' }, { value: 'comfortable', label: 'Normal' }, { value: 'spacious', label: 'Spacious' }]} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

// ─── TWEAK DEFAULTS ───────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = {
  theme: 'natt',
  exerciseMix: 'cycle',
  density: 'compact',
};

// ─── DATA HOOK ────────────────────────────────────────────────────────────────
function useAppData() {
  const [verbs, setVerbs] = React.useState(null);
  const [vocab, setVocab] = React.useState(null);

  React.useEffect(() => {
    async function load() {
      try {
        const [vRes, nRes] = await Promise.all([
          db.from('verbs').select('*'),
          db.from('nouns').select('*'),
        ]);
        if (vRes.error) throw new Error('verbs: ' + vRes.error.message);
        if (nRes.error) throw new Error('nouns: ' + nRes.error.message);

        const mappedVerbs = (vRes.data || []).map(r => ({
          english:           r.english          || r.English          || '',
          infinitiv:         r.infinitiv         || r.Norwegian_infinitiv || r.norwegian_infinitiv || r.Infinitiv || '',
          presens:           r.presens           || r.Presens          || '',
          preteritum:        r.preteritum        || r.Preteritum       || '',
          presens_perfectum: r.presens_perfectum || r.Presens_perfectum || '',
        })).filter(v => v.infinitiv);

        const mappedVocab = (nRes.data || []).map(r => ({
          english:   r.english  || r.English  || '',
          norwegian: r.norsk    || r.norwegian || r.Norwegian || '',
          hint:      r.hint     || r.category  || '',
        })).filter(v => v.norwegian);

        setVerbs(mappedVerbs.length ? mappedVerbs : FALLBACK_VERBS);
        setVocab(mappedVocab.length ? mappedVocab : FALLBACK_VOCAB);
      } catch (e) {
        console.error('Supabase fetch error:', e);
        setVerbs(FALLBACK_VERBS);
        setVocab(FALLBACK_VOCAB);
      }
    }
    load();
  }, []);

  return { verbs, vocab };
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App() {
  const { verbs, vocab } = useAppData();
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [settingsOpen, setSettingsOpen] = React.useState(false);
  const loading = !verbs || !vocab;
  const t = THEMES[tweaks.theme] || THEMES.natt;

  // Sync theme background to the outer wrapper via CSS custom property
  // so the app-outer matches on mobile (no visible seam)
  React.useEffect(() => {
    document.documentElement.style.setProperty('--app-bg', t.bg);
    // Also tint the browser toolbar on Android Chrome
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute('content', t.bg);
  }, [t.bg]);

  if (loading) {
    return (
      <div style={{ width: '100%', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#141820', flexDirection: 'column', gap: 12 }}>
        <div style={{ width: 30, height: 30, border: '2.5px solid #2a3344', borderTop: '2.5px solid #5e9e88', borderRadius: '50%', animation: 'spin 0.8s linear infinite' }} />
        <p style={{ color: '#7a8496', fontFamily: 'Sora, sans-serif', fontSize: 13 }}>Loading…</p>
      </div>
    );
  }

  return (
    <div className="app-outer">
      <NorwegianApp
        t={t}
        verbs={verbs}
        vocab={vocab}
        exerciseMix={tweaks.exerciseMix}
        density={tweaks.density}
        settingsOpen={settingsOpen}
        onSettingsToggle={() => setSettingsOpen(o => !o)}
        tweaks={tweaks}
        setTweak={setTweak}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
