function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ open, onClose, title = 'Settings', children }) {
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 64 });
  const PAD = 16;
  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close settings" onMouseDown={(e) => e.stopPropagation()} onClick={onClose}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {

function TweakRow({ label, children }) {

}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const valueRef = React.useRef(value);
  valueRef.current = value;
  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };
  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { if (!trackRef.current) return; const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown} className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (<button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>))}
      </div>
    </TweakRow>
  );
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getChoices(correct, allItems, field) {
  const wrongs = shuffle(allItems.filter(v => v[field] !== correct)).slice(0, 3).map(v => v[field]);
  return shuffle([correct, ...wrongs]);
}

// ─── VOCAB SESSION ────────────────────────────────────────────────────────────
// cardType cycles: 0=flip, 1=multiple choice, 2=free text
function VocabSession({ t, vocab, onBack, onAgain, exerciseMix, d }) {
  const [cards] = React.useState(() => shuffle(vocab));
  const [idx, setIdx] = React.useState(0);
  const [flipped, setFlipped] = React.useState(false);
  const [selected, setSelected] = React.useState(null);
  const [result, setResult] = React.useState(null);
  const [done, setDone] = React.useState(false);
  const [score, setScore] = React.useState(0);
  const [animKey, setAnimKey] = React.useState(0);
  const [shakeKey, setShakeKey] = React.useState(0);

  const cardTypeMap = { cycle: [0,1,2], write: [1,2,2], reveal: [0,0,0] };
  const seq = cardTypeMap[exerciseMix] || cardTypeMap.cycle;
  const cardType = seq[idx % seq.length];
  const card = cards[idx];
  const front = card.english;
  const back  = card.norwegian;

  const choices = React.useMemo(() => getChoices(back, vocab, 'norwegian'), [idx]);

  function advance(correct) {
    if (correct) setScore(s => s + 1);
    setTimeout(() => {
      if (idx + 1 >= cards.length) { setDone(true); return; }
      setIdx(i => i + 1);
      setFlipped(false);
      setSelected(null);
      setResult(null);
      setAnimKey(k => k + 1);
    }, 700);
  }

  function handleChoice(choice) {
    if (selected) return;
    setSelected(choice);
    const correct = choice === back;
    setResult(correct ? 'correct' : 'wrong');
    if (!correct) setShakeKey(k => k + 1);
    advance(correct);
  }

  const modeLabel = ['Card reveal', 'Multiple choice', 'Write it'][cardType];

  if (done) return <SessionEnd t={t} score={score} total={cards.length} onBack={onBack} onAgain={onAgain} label="Words correct" />;

  return (
    <div style={{ flex: 1, height: '100%', display: 'flex', flexDirection: 'column' }}>
      <div style={{ padding: '14px 20px 10px' }}>
        <BackButton t={t} onPress={onBack} />
        <div style={{ marginTop: 12 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
            <span style={{ fontSize: 12, color: t.textSub }}>{modeLabel}</span>
            <span style={{ fontSize: 12, color: t.textSub }}>{idx + 1} / {cards.length}</span>
          </div>
          <ProgressBar current={idx + 1} total={cards.length} t={t} />
        </div>
      </div>

      <div key={animKey} style={{ flex: 1, padding: '8px 20px', display: 'flex', flexDirection: 'column', gap: 12, animation: 'fadeUp .25s ease', overflowY: 'auto' }}>
        {cardType === 0 && <FlipCard t={t} front={front} back={back} frontLabel="English" backLabel="Norsk" flipped={flipped} onFlip={() => setFlipped(true)} hint={card.hint} onGotIt={() => advance(true)} onRepeat={() => advance(false)} d={d} />}
        {cardType === 1 && <MultipleChoice t={t} front={front} frontLabel="English" backLabel="Norsk" choices={choices} correct={back} selected={selected} result={result} shakeKey={shakeKey} hint={card.hint} onChoice={handleChoice} d={d} />}
        {cardType === 2 && <FreeText t={t} front={front} correct={back} hint={card.hint} onAdvance={advance} d={d} />}
      </div>
    </div>
  );
}

function FlipCard({ t, front, back, frontLabel, backLabel, flipped, onFlip, hint, onGotIt, onRepeat, d }) {
  const dp = d || DENSITY.comfortable;
  return (
    <>
      <div onClick={!flipped ? onFlip : undefined}
        style={{ cursor: flipped ? 'default' : 'pointer', background: t.surface, border: `1px solid ${t.border}`, borderRadius: 20, padding: dp.cardPad, minHeight: 180, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 8, transition: 'box-shadow .2s', animation: flipped ? 'flipIn .3s ease' : 'none' }}>
        <p style={{ fontSize: 11, color: t.textSub, fontWeight: 600, letterSpacing: '.08em', textTransform: 'uppercase' }}>{flipped ? backLabel : frontLabel}</p>
        <p style={{ fontFamily: 'IBM Plex Mono, monospace', fontSize: dp.fontSize, fontWeight: 500, color: t.text, textAlign: 'center', letterSpacing: '-.01em' }}>
          {flipped ? back : front}
        </p>
        {hint && <span style={{ fontSize: 11, color: t.textSub, marginTop: 4 }}>{hint}</span>}
        {!flipped && <p style={{ fontSize: 12, color: t.textSub, marginTop: 8 }}>Tap to reveal</p>}
      </div>

      {flipped && (
        <div style={{ display: 'flex', gap: 10, animation: 'fadeUp .2s ease' }}>
          <button onClick={onRepeat} style={{ flex: 1, padding: '14px', background: t.surfaceAlt, border: `1px solid ${t.border}`, borderRadius: 14, cursor: 'pointer', fontFamily: 'Sora, sans-serif', fontSize: 14, fontWeight: 500, color: t.textSub }}>
            Again
          </button>
          <button onClick={onGotIt} style={{ flex: 1, padding: '14px', background: t.accent, border: 'none', borderRadius: 14, cursor: 'pointer', fontFamily: 'Sora, sans-serif', fontSize: 14, fontWeight: 600, color: '#fff' }}>
            Got it
          </button>
        </div>
      )}
    </>
  );
}

function MultipleChoice({ t, front, frontLabel, backLabel, choices, correct, selected, result, shakeKey, hint, onChoice, d }) {
  const dp = d || DENSITY.comfortable;
  return (
    <>
      <div style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 20, padding: dp.cardPadLg, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
        <p style={{ fontSize: 11, color: t.textSub, fontWeight: 600, letterSpacing: '.08em', textTransform: 'uppercase' }}>{frontLabel}</p>
        <p style={{ fontFamily: 'IBM Plex Mono, monospace', fontSize: dp.fontSize - 2, fontWeight: 500, color: t.text, textAlign: 'center' }}>{front}</p>
        {hint && <span style={{ fontSize: 11, color: t.textSub }}>{hint}</span>}
      </div>

      <p style={{ fontSize: 11, color: t.textSub, fontWeight: 600, letterSpacing: '.08em', textTransform: 'uppercase', textAlign: 'center' }}>{backLabel}</p>

      <div key={shakeKey} style={{ display: 'flex', flexDirection: 'column', gap: dp.gap, animation: result === 'wrong' ? `shake .4s ease` : 'none' }}>
        {choices.map(ch => {
          let bg = t.surface, border = t.border, color = t.text;
          if (selected === ch) {
            bg    = ch === correct ? t.correctSoft : t.wrongSoft;
            border= ch === correct ? t.correct      : t.wrong;
            color = ch === correct ? t.correct      : t.wrong;
          } else if (selected && ch === correct) {
            bg = t.correctSoft; border = t.correct; color = t.correct;
          }
          return (
            <button key={ch} onClick={() => onChoice(ch)}
              style={{ background: bg, border: `1.5px solid ${border}`, borderRadius: 14, padding: '14px 18px', cursor: selected ? 'default' : 'pointer', fontFamily: 'IBM Plex Mono, monospace', fontSize: 16, fontWeight: 500, color, textAlign: 'left', transition: 'background .25s, border-color .25s, color .25s' }}>
              {ch}
            </button>
          );
        })}
      </div>
    </>
  );
}

function FreeText({ t, front, correct, hint, onAdvance, d }) {
  const dp = d || DENSITY.comfortable;
  const [value, setValue] = React.useState('');
  const [result, setResult] = React.useState(null);
  const inputRef = React.useRef(null);

  React.useEffect(() => { inputRef.current?.focus(); }, []);

  function check() {
    if (!value.trim() || result) return;
    const ok = value.trim().toLowerCase() === correct.toLowerCase();
    setResult(ok ? 'correct' : 'wrong');
    setTimeout(() => onAdvance(ok), 900);
  }

  function handleKey(e) { if (e.key === 'Enter') check(); }

  const borderColor = result === 'correct' ? t.correct : result === 'wrong' ? t.wrong : value ? t.accent : t.border;
  const bg          = result === 'correct' ? t.correctSoft : result === 'wrong' ? t.wrongSoft : t.surface;

  return (
    <>
      <div style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 20, padding: dp.cardPad, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8 }}>
        <p style={{ fontSize: 11, color: t.textSub, fontWeight: 600, letterSpacing: '.08em', textTransform: 'uppercase' }}>English</p>
        <p style={{ fontFamily: 'IBM Plex Mono, monospace', fontSize: dp.fontSize, fontWeight: 500, color: t.text, textAlign: 'center' }}>{front}</p>
        {hint && <span style={{ fontSize: 11, color: t.textSub }}>{hint}</span>}
      </div>

      <p style={{ fontSize: 11, color: t.textSub, fontWeight: 600, letterSpacing: '.08em', textTransform: 'uppercase', textAlign: 'center' }}>Write in Norwegian</p>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        <input
          ref={inputRef}
          value={value}
          onChange={e => setValue(e.target.value)}
          onKeyDown={handleKey}
          disabled={!!result}
          placeholder="Type the Norwegian word…"
          style={{ width: '100%', padding: '14px 16px', background: bg, border: `1.5px solid ${borderColor}`, borderRadius: 14, fontFamily: 'IBM Plex Mono, monospace', fontSize: 16, color: t.text, outline: 'none', transition: 'border-color .2s, background .2s', caretColor: t.accent }}
        />
        {!result && (
          <button onClick={check} disabled={!value.trim()}
            style={{ width: '100%', padding: '14px', background: value.trim() ? t.accent : t.surfaceAlt, border: 'none', borderRadius: 14, cursor: value.trim() ? 'pointer' : 'default', fontFamily: 'Sora, sans-serif', fontSize: 14, fontWeight: 600, color: value.trim() ? '#fff' : t.textSub, transition: 'background .2s' }}>
            Check
          </button>
        )}
        {result && (
          <div style={{ animation: 'fadeUp .2s ease', background: result === 'correct' ? t.correctSoft : t.wrongSoft, border: `1px solid ${result === 'correct' ? t.correct : t.wrong}`, borderRadius: 14, padding: '12px 16px' }}>
            <p style={{ fontSize: 13, fontWeight: 600, color: result === 'correct' ? t.correct : t.wrong }}>
              {result === 'correct' ? 'Riktig! ✓' : `Feil — correct: ${correct}`}
            </p>
          </div>
        )}
      </div>
    </>
  );
}

// ─── VERB SESSION ─────────────────────────────────────────────────────────────
function VerbSession({ t, verbs, onBack, onAgain }) {
  const questions = React.useMemo(() => {
    const q = [];
    shuffle(verbs).slice(0, 10).forEach(v => {
      const form = VERB_FORMS[Math.floor(Math.random() * VERB_FORMS.length)];
      q.push({ verb: v, form });
    });
    return q;
  }, []);

  const [idx, setIdx] = React.useState(0);
  const [selected, setSelected] = React.useState(null);
  const [result, setResult] = React.useState(null);
  const [done, setDone] = React.useState(false);
  const [score, setScore] = React.useState(0);
  const [animKey, setAnimKey] = React.useState(0);
  const [shakeKey, setShakeKey] = React.useState(0);

  const q = questions[idx];
  const correct = q.verb[q.form.key];

  const choices = React.useMemo(() => {
    return getChoices(correct, verbs, q.form.key);
  }, [idx]);

  function handleChoice(ch) {
    if (selected) return;
    setSelected(ch);
    const ok = ch === correct;
    setResult(ok ? 'correct' : 'wrong');
    if (!ok) setShakeKey(k => k + 1);
    if (ok) setScore(s => s + 1);
    setTimeout(() => {
      if (idx + 1 >= questions.length) { setDone(true); return; }
      setIdx(i => i + 1);
      setSelected(null);
      setResult(null);
      setAnimKey(k => k + 1);
    }, 700);
  }

  if (done) return <SessionEnd t={t} score={score} total={questions.length} onBack={onBack} onAgain={onAgain} label="Correct answers" />;

  return (
    <div style={{ flex: 1, height: '100%', display: 'flex', flexDirection: 'column' }}>
      <div style={{ padding: '14px 20px 10px' }}>
        <BackButton t={t} onPress={onBack} />
        <div style={{ marginTop: 12 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
            <span style={{ fontSize: 12, color: t.textSub }}>Verb forms</span>
            <span style={{ fontSize: 12, color: t.textSub }}>{idx + 1} / {questions.length}</span>
          </div>
          <ProgressBar current={idx + 1} total={questions.length} t={t} />
        </div>
      </div>

      <div key={animKey} style={{ flex: 1, padding: '8px 20px', display: 'flex', flexDirection: 'column', gap: 12, animation: 'fadeUp .25s ease', overflowY: 'auto' }}>
        <div style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 20, padding: '24px 20px', display: 'flex', flexDirection: 'column', gap: 6 }}>
          <p style={{ fontSize: 11, color: t.textSub, fontWeight: 600, letterSpacing: '.08em', textTransform: 'uppercase' }}>Infinitiv</p>
          <p style={{ fontFamily: 'IBM Plex Mono, monospace', fontSize: 26, fontWeight: 500, color: t.text }}>{q.verb.infinitiv}</p>
          <p style={{ fontSize: 13, color: t.textSub }}>{q.verb.english}</p>
        </div>

        <div style={{ background: t.accentSoft, border: `1.5px solid ${t.accent}`, borderRadius: 14, padding: '12px 16px', display: 'flex', alignItems: 'center', gap: 10 }}>
          <div>
            <p style={{ fontSize: 13, fontWeight: 600, color: t.accent }}>What is the {q.form.label}?</p>
            <p style={{ fontSize: 11, color: t.accent, opacity: .7 }}>{q.form.sublabel}</p>
          </div>
        </div>

        <div key={shakeKey} style={{ display: 'flex', flexDirection: 'column', gap: 8, animation: result === 'wrong' ? 'shake .4s ease' : 'none' }}>
          {choices.map(ch => {
            let bg = t.surface, border = t.border, color = t.text;
            if (selected === ch) {
              bg    = ch === correct ? t.correctSoft : t.wrongSoft;
              border= ch === correct ? t.correct      : t.wrong;
              color = ch === correct ? t.correct      : t.wrong;
            } else if (selected && ch === correct) {
              bg = t.correctSoft; border = t.correct; color = t.correct;
            }
            return (
              <button key={ch} onClick={() => handleChoice(ch)}
                style={{ background: bg, border: `1.5px solid ${border}`, borderRadius: 14, padding: '14px 18px', cursor: selected ? 'default' : 'pointer', fontFamily: 'IBM Plex Mono, monospace', fontSize: 15, fontWeight: 500, color, textAlign: 'left', transition: 'background .25s, border-color .25s, color .25s' }}>
                {ch}
              </button>
            );
          })}
        </div>

        {selected && (
          <div style={{ animation: 'fadeUp .2s ease', background: result === 'correct' ? t.correctSoft : t.wrongSoft, border: `1px solid ${result === 'correct' ? t.correct : t.wrong}`, borderRadius: 14, padding: '12px 16px' }}>
            <p style={{ fontSize: 13, fontWeight: 600, color: result === 'correct' ? t.correct : t.wrong }}>
              {result === 'correct' ? 'Riktig! ✓' : `Feil — correct: ${correct}`}
            </p>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── SESSION END ─────────────────────────────────────────────────────────────
function SessionEnd({ t, score, total, onBack, onAgain, label }) {
  const pct = Math.round((score / total) * 100);
  const msg = pct >= 80 ? 'Bra jobbet!' : pct >= 50 ? 'Ikke verst!' : 'Fortsett å øve!';
  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '0 28px', gap: 20, animation: 'fadeUp .4s ease', height: '100%' }}>
      <div style={{ textAlign: 'center' }}>
        <p style={{ fontFamily: 'IBM Plex Mono, monospace', fontSize: 64, fontWeight: 500, color: t.accent, lineHeight: 1 }}>{pct}%</p>
        <p style={{ fontSize: 20, fontWeight: 600, color: t.text, marginTop: 8 }}>{msg}</p>
        <p style={{ fontSize: 13, color: t.textSub, marginTop: 4 }}>{label}: {score} / {total}</p>
      </div>
      <div style={{ display: 'flex', gap: 10, width: '100%' }}>
        <button onClick={onBack} style={{ flex: 1, padding: '15px', background: t.surfaceAlt, border: `1px solid ${t.border}`, borderRadius: 14, cursor: 'pointer', fontFamily: 'Sora, sans-serif', fontSize: 14, fontWeight: 500, color: t.text }}>
          Home
        </button>
        <button onClick={onAgain} style={{ flex: 1, padding: '15px', background: t.accent, border: 'none', borderRadius: 14, cursor: 'pointer', fontFamily: 'Sora, sans-serif', fontSize: 14, fontWeight: 600, color: '#fff' }}>
          Again
        </button>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
const DENSITY = {
  compact:     { cardPad: '20px 18px', cardPadLg: '22px 18px', fontSize: 24, gap: 8  },
  comfortable: { cardPad: '32px 24px', cardPadLg: '24px 20px', fontSize: 28, gap: 12 },
  spacious:    { cardPad: '44px 28px', cardPadLg: '30px 24px', fontSize: 32, gap: 16 },
};

function NorwegianApp({ t, verbs, vocab, exerciseMix = 'cycle', density = 'comfortable' }) {
  const [screen, setScreen] = React.useState('home');
  const [sessionKey, setSessionKey] = React.useState(0);
  const d = DENSITY[density] || DENSITY.comfortable;

  const goHome   = () => setScreen('home');
  const restart  = () => setSessionKey(k => k + 1);

  const inner = () => {
    if (screen === 'home')        return <HomeScreen   t={t} verbs={verbs} vocab={vocab} onNavigate={setScreen} />;
    if (screen === 'vocab-en-no') return <VocabSession key={sessionKey} t={t} vocab={vocab} exerciseMix={exerciseMix} d={d} onBack={goHome} onAgain={restart} />;
    if (screen === 'verbs')       return <VerbSession  key={sessionKey} t={t} verbs={verbs} onBack={goHome} onAgain={restart} />;
  };

  return (
    <div style={{ width: 390, height: 844, background: t.bg, borderRadius: 50, overflow: 'hidden', display: 'flex', flexDirection: 'column', fontFamily: 'Sora, sans-serif', boxShadow: '0 30px 80px rgba(0,0,0,0.28)', position: 'relative' }}>
      <StatusBar t={t} />
      <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
        {inner()}
      </div>
      <HomeIndicator t={t} />
    </div>
  );
}

// ─── TWEAK DEFAULTS ──────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = {
  theme: 'natt',
  exerciseMix: 'cycle',
  density: 'compact',
};

// ─── DATA HOOK ───────────────────────────────────────────────────────────────
function useAppData() {
  const [verbs, setVerbs] = React.useState(null);
  const [vocab, setVocab] = React.useState(null);

  React.useEffect(() => {
    async function load() {
      try {
        const [vRes, nRes] = await Promise.all([
          db.from('verbs').select('*'),
          db.from('nouns').select('*'),
        ]);
        if (vRes.error) throw new Error('verbs: ' + vRes.error.message);
        if (nRes.error) throw new Error('nouns: ' + nRes.error.message);

        const mappedVerbs = (vRes.data || []).map(r => ({
          english:           r.english          || r.English          || '',
          infinitiv:         r.infinitiv         || r.Norwegian_infinitiv || r.norwegian_infinitiv || r.Infinitiv || '',
          presens:           r.presens           || r.Presens          || '',
          preteritum:        r.preteritum        || r.Preteritum       || '',
          presens_perfectum: r.presens_perfectum || r.Presens_perfectum || '',
        })).filter(v => v.infinitiv);

        const mappedVocab = (nRes.data || []).map(r => ({
          english:   r.english  || r.English  || '',
          norwegian: r.norsk    || r.norwegian || r.Norwegian || '',
          hint:      r.hint     || r.category  || '',
        })).filter(v => v.norwegian);

        setVerbs(mappedVerbs.length ? mappedVerbs : FALLBACK_VERBS);
        setVocab(mappedVocab.length ? mappedVocab : FALLBACK_VOCAB);
      } catch(e) {
        console.error('Supabase fetch error:', e);
        setVerbs(FALLBACK_VERBS);
        setVocab(FALLBACK_VOCAB);
      }
    }
    load();
  }, []);

  return { verbs, vocab };
}

// ─── ROOT ────────────────────────────────────────────────────────────────────
function App() {
  const { verbs, vocab } = useAppData();
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [settingsOpen, setSettingsOpen] = React.useState(false);
  const loading = !verbs || !vocab;
  const t = THEMES[tweaks.theme] || THEMES.natt;

  if (loading) {
    return (
      <div style={{ width: '100vw', height: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#141820', flexDirection: 'column', gap: 12 }}>
        <div style={{ width: 32, height: 32, border: '2.5px solid #2a3344', borderTop: '2.5px solid #5e9e88', borderRadius: '50%', animation: 'spin 0.8s linear infinite' }}></div>
        <p style={{ color: '#7a8496', fontFamily: 'Sora, sans-serif', fontSize: 13 }}>Loading…</p>
        <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
      </div>
    );
  }

  return (
    <div style={{ width: '100vw', height: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#0e1014' }}>
      <NorwegianApp t={t} verbs={verbs} vocab={vocab} exerciseMix={tweaks.exerciseMix} density={tweaks.density} />
      <button
        onClick={() => setSettingsOpen(o => !o)}
        title="Settings"
        style={{
          position: 'fixed', bottom: 16, right: 16, zIndex: 2147483645,
          width: 36, height: 36, borderRadius: 18, border: 'none',
          background: 'rgba(255,255,255,0.1)', color: 'rgba(255,255,255,0.6)',
          cursor: 'pointer', fontSize: 17, display: 'flex', alignItems: 'center',
          justifyContent: 'center', backdropFilter: 'blur(8px)',
          boxShadow: '0 2px 8px rgba(0,0,0,0.35)', transition: 'background .15s',
        }}
        onMouseEnter={e => e.currentTarget.style.background = 'rgba(255,255,255,0.18)'}
        onMouseLeave={e => e.currentTarget.style.background = 'rgba(255,255,255,0.1)'}
      >⚙</button>
      <TweaksPanel open={settingsOpen} onClose={() => setSettingsOpen(false)}>
        <TweakSection label="Theme">
          <TweakRadio value={tweaks.theme} onChange={v => setTweak('theme', v)}
            options={[{ value: 'natt', label: 'Natt' }, { value: 'fjord', label: 'Fjord' }, { value: 'birch', label: 'Birch' }]} />
        </TweakSection>
        <TweakSection label="Exercise Mix">
          <TweakRadio value={tweaks.exerciseMix} onChange={v => setTweak('exerciseMix', v)}
            options={[{ value: 'cycle', label: 'Cycle' }, { value: 'write', label: 'Write-heavy' }, { value: 'reveal', label: 'Reveal only' }]} />
        </TweakSection>
        <TweakSection label="Card Density">
          <TweakRadio value={tweaks.density} onChange={v => setTweak('density', v)}
            options={[{ value: 'compact', label: 'Compact' }, { value: 'comfortable', label: 'Normal' }, { value: 'spacious', label: 'Spacious' }]} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
