// ─── UTILITIES ────────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getChoices(correct, allItems, field) {
  const wrongs = shuffle(allItems.filter(v => v[field] !== correct)).slice(0, 3).map(v => v[field]);
  return shuffle([correct, ...wrongs]);
}

// ─── SETTINGS (tweaks) ────────────────────────────────────────────────────────
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((key, val) => {
    setValues(prev => ({ ...prev, [key]: val }));
  }, []);
  return [values, setTweak];
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map(o => typeof o === 'object' ? o : { value: o, label: o });
  const idx = Math.max(0, opts.findIndex(o => o.value === value));
  const n = opts.length;
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = clientX => {
    const r = trackRef.current.getBoundingClientRect();
    const i = Math.floor(((clientX - r.left - 2) / (r.width - 4)) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };
  const onPointerDown = e => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = ev => { if (!trackRef.current) return; const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); };
    const up   = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown} className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map(o => <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>)}
      </div>
    </TweakRow>
  );
}

// ─── VOCAB SESSION ────────────────────────────────────────────────────────────
function VocabSession({ t, vocab, onBack, onAgain, exerciseMix, d, onProgressUpdate }) {
  const [cards] = React.useState(() => shuffle(vocab));
  const [idx, setIdx] = React.useState(0);
  const [flipped, setFlipped] = React.useState(false);

  const [score, setScore] = React.useState(0);
  const [animKey, setAnimKey] = React.useState(0);
  const [shakeKey, setShakeKey] = React.useState(0);

  const cardTypeMap = { cycle: [0, 1, 2], write: [1, 2, 2], reveal: [0, 0, 0] };
  const seq = cardTypeMap[exerciseMix] || cardTypeMap.cycle;
  const cardType = seq[idx % seq.length];
  const card = cards[idx];
  const back = card.norwegian;

  const choices = React.useMemo(() => getChoices(back, vocab, 'norwegian'), [idx]);

  // Sync progress to header
  React.useEffect(() => { onProgressUpdate((idx) / cards.length); }, [idx]);

  function advance(correct) {
    if (correct) setScore(s => s + 1);
    setTimeout(() => {
      if (idx + 1 >= cards.length) { onProgressUpdate(1); setDone(true); return; }
      setIdx(i => i + 1);
      setFlipped(false); setSelected(null); setResult(null);
      setAnimKey(k => k + 1);
    }, 700);
  }

  function handleChoice(choice) {
    if (selected) return;
    setSelected(choice);
    const correct = choice === back;
    setResult(correct ? 'correct' : 'wrong');
    if (!correct) setShakeKey(k => k + 1);
    advance(correct);
  }

  const modeLabel = ['Card reveal', 'Multiple choice', 'Write it'][cardType];

  if (done) return <SessionEnd t={t} score={score} total={cards.length} onBack={onBack} onAgain={onAgain} label="Words correct" />;

  return (
    <div className="content" style={{ paddingTop: 24 }}>
      <SessionHeader t={t} label={modeLabel} current={idx + 1} total={cards.length} />
      <div key={animKey} style={{ display: 'flex', flexDirection: 'column', gap: 12, animation: 'fadeUp .25s ease' }}>
        {cardType === 0 && <FlipCard  t={t} front={card.english} back={back} frontLabel="English" backLabel="Norsk" flipped={flipped} onFlip={() => setFlipped(true)} hint={card.hint} onGotIt={() => advance(true)} onRepeat={() => advance(false)} d={d} />}
        {cardType === 1 && <MultipleChoice t={t} front={card.english} frontLabel="English" backLabel="Norsk" choices={choices} correct={back} selected={selected} result={result} shakeKey={shakeKey} hint={card.hint} onChoice={handleChoice} d={d} />}
        {cardType === 2 && <FreeText  t={t} front={card.english} correct={back} hint={card.hint} onAdvance={advance} d={d} />}
      </div>
    </div>
  );
}

function FlipCard({ t, front, back, frontLabel, backLabel, flipped, onFlip, hint, onGotIt, onRepeat, d }) {
  const dp = d || DENSITY.comfortable;
  return (
    <>
      <div
        onClick={!flipped ? onFlip : undefined}
        style={{
          cursor: flipped ? 'default' : 'pointer',
          background: t.surface, border: `1px solid ${t.border}`, borderRadius: 16,
          padding: dp.cardPad, minHeight: 160,
          display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 8,
          animation: flipped ? 'flipIn .3s ease' : 'none',
          transition: 'box-shadow .15s',
        }}
      >
        <p style={{ fontSize: 11, color: t.textSub, fontWeight: 600, letterSpacing: '.08em', textTransform: 'uppercase' }}>
          {flipped ? backLabel : frontLabel}
        </p>
        <p style={{ fontFamily: 'IBM Plex Mono, monospace', fontSize: dp.fontSize, fontWeight: 500, color: t.text, textAlign: 'center' }}>
          {flipped ? back : front}
        </p>
        {hint && <span style={{ fontSize: 11, color: t.textSub }}>{hint}</span>}
        {!flipped && <p style={{ fontSize: 12, color: t.textSub, marginTop: 4 }}>Tap to reveal</p>}
      </div>
      {flipped && (
        <div style={{ display: 'flex', gap: 10, animation: 'fadeUp .2s ease' }}>
          <button onClick={onRepeat} style={{ flex: 1, minHeight: 50, padding: '13px', background: t.surfaceAlt, border: `1px solid ${t.border}`, borderRadius: 12, cursor: 'pointer', fontFamily: 'Sora, sans-serif', fontSize: 14, fontWeight: 500, color: t.textSub }}>
            Again
          </button>
          <button onClick={onGotIt} style={{ flex: 1, minHeight: 50, padding: '13px', background: t.accent, border: 'none', borderRadius: 12, cursor: 'pointer', fontFamily: 'Sora, sans-serif', fontSize: 14, fontWeight: 600, color: '#fff' }}>
            Got it ✓
          </button>
        </div>
      )}
    </>
  );
}

function MultipleChoice({ t, front, frontLabel, backLabel, choices, correct, selected, result, shakeKey, hint, onChoice, d }) {
  const dp = d || DENSITY.comfortable;
  return (
    <>
      <div style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 16, padding: dp.cardPadLg, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
        <p style={{ fontSize: 11, color: t.textSub, fontWeight: 600, letterSpacing: '.08em', textTransform: 'uppercase' }}>{frontLabel}</p>
        <p style={{ fontFamily: 'IBM Plex Mono, monospace', fontSize: dp.fontSize - 2, fontWeight: 500, color: t.text, textAlign: 'center' }}>{front}</p>
        {hint && <span style={{ fontSize: 11, color: t.textSub }}>{hint}</span>}
      </div>
      <p style={{ fontSize: 11, color: t.textSub, fontWeight: 600, letterSpacing: '.08em', textTransform: 'uppercase', textAlign: 'center' }}>{backLabel}</p>
      <div key={shakeKey} style={{ display: 'flex', flexDirection: 'column', gap: dp.gap, animation: result === 'wrong' ? 'shake .4s ease' : 'none' }}>
        {choices.map(ch => {
          let bg = t.surface, border = t.border, color = t.text;
          if (selected === ch) {
            bg = ch === correct ? t.correctSoft : t.wrongSoft;
            border = ch === correct ? t.correct : t.wrong;
            color  = ch === correct ? t.correct : t.wrong;
          } else if (selected && ch === correct) {
            bg = t.correctSoft; border = t.correct; color = t.correct;
          }
          return (
            <button key={ch} onClick={() => onChoice(ch)} style={{
              minHeight: 50, background: bg, border: `1.5px solid ${border}`,
              borderRadius: 12, padding: '13px 16px',
              cursor: selected ? 'default' : 'pointer',
              fontFamily: 'IBM Plex Mono, monospace', fontSize: 15, fontWeight: 500,
              color, textAlign: 'left',
              transition: 'background .2s, border-color .2s, color .2s',
            }}>{ch}</button>
          );
        })}
      </div>
    </>
  );
}

function FreeText({ t, front, correct, hint, onAdvance, d }) {
  const dp = d || DENSITY.comfortable;
  const [value, setValue] = React.useState('');
  const [result, setResult] = React.useState(null);
  const inputRef = React.useRef(null);

  React.useEffect(() => {
    const id = setTimeout(() => inputRef.current?.focus(), 100);
    return () => clearTimeout(id);
  }, []);

  function check() {
    if (!value.trim() || result) return;
    const ok = value.trim().toLowerCase() === correct.toLowerCase();
    setResult(ok ? 'correct' : 'wrong');
    setTimeout(() => onAdvance(ok), 900);
  }

  const borderColor = result === 'correct' ? t.correct : result === 'wrong' ? t.wrong : value ? t.accent : t.border;
  const bg          = result === 'correct' ? t.correctSoft : result === 'wrong' ? t.wrongSoft : t.surface;

  return (
    <>
      <div style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 16, padding: dp.cardPad, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8 }}>
        <p style={{ fontSize: 11, color: t.textSub, fontWeight: 600, letterSpacing: '.08em', textTransform: 'uppercase' }}>English</p>
        <p style={{ fontFamily: 'IBM Plex Mono, monospace', fontSize: dp.fontSize, fontWeight: 500, color: t.text, textAlign: 'center' }}>{front}</p>
        {hint && <span style={{ fontSize: 11, color: t.textSub }}>{hint}</span>}
      </div>
      <p style={{ fontSize: 11, color: t.textSub, fontWeight: 600, letterSpacing: '.08em', textTransform: 'uppercase', textAlign: 'center' }}>Write in Norwegian</p>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        <input
          ref={inputRef}
          value={value}
          onChange={e => setValue(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter') check(); }}
          disabled={!!result}
          placeholder="Type the Norwegian word…"
          style={{
            width: '100%', height: 50, padding: '0 16px',
            background: bg, border: `1.5px solid ${borderColor}`, borderRadius: 12,
            fontFamily: 'IBM Plex Mono, monospace', fontSize: 16, color: t.text,
            outline: 'none', transition: 'border-color .2s, background .2s',
            caretColor: t.accent,
          }}
        />
        {!result && (
          <button
            onClick={check}
            disabled={!value.trim()}
            style={{
              width: '100%', height: 50, background: value.trim() ? t.accent : t.surfaceAlt,
              border: 'none', borderRadius: 12, cursor: value.trim() ? 'pointer' : 'default',
              fontFamily: 'Sora, sans-serif', fontSize: 14, fontWeight: 600,
              color: value.trim() ? '#fff' : t.textSub, transition: 'background .2s',
            }}
          >Check</button>
        )}
        {result && (
          <div style={{ animation: 'fadeUp .2s ease', background: result === 'correct' ? t.correctSoft : t.wrongSoft, border: `1px solid ${result === 'correct' ? t.correct : t.wrong}`, borderRadius: 12, padding: '11px 16px' }}>
            <p style={{ fontSize: 13, fontWeight: 600, color: result === 'correct' ? t.correct : t.wrong }}>
              {result === 'correct' ? 'Riktig! ✓' : `Feil — correct: ${correct}`}
            </p>
          </div>
        )}
      </div>
    </>
  );
}

// ─── VERB SESSION ─────────────────────────────────────────────────────────────
function VerbSession({ t, verbs, onBack, onAgain, onProgressUpdate }) {
  const questions = React.useMemo(() => {
    return shuffle(verbs).slice(0, 10).map(v => ({
      verb: v,
      form: VERB_FORMS[Math.floor(Math.random() * VERB_FORMS.length)],
    }));
  }, []);

  const [idx, setIdx] = React.useState(0);
  const [selected, setSelected] = React.useState(null);
  const [result, setResult] = React.useState(null);
  const [done, setDone] = React.useState(false);
  const [score, setScore] = React.useState(0);
  const [animKey, setAnimKey] = React.useState(0);
  const [shakeKey, setShakeKey] = React.useState(0);

  const q = questions[idx];
  const correct = q.verb[q.form.key];
  const choices = React.useMemo(() => getChoices(correct, verbs, q.form.key), [idx]);

  React.useEffect(() => { onProgressUpdate(idx / questions.length); }, [idx]);

  function handleChoice(ch) {
    if (selected) return;
    setSelected(ch);
    const ok = ch === correct;
    setResult(ok ? 'correct' : 'wrong');
    if (!ok) setShakeKey(k => k + 1);
    if (ok) setScore(s => s + 1);
    setTimeout(() => {
      if (idx + 1 >= questions.length) { onProgressUpdate(1); setDone(true); return; }
      setIdx(i => i + 1);
      setSelected(null); setResult(null);
      setAnimKey(k => k + 1);
    }, 700);
  }

  if (done) return <SessionEnd t={t} score={score} total={questions.length} onBack={onBack} onAgain={onAgain} label="Correct answers" />;

  return (
    <div className="content" style={{ paddingTop: 24 }}>
      <SessionHeader t={t} label="Verb forms" current={idx + 1} total={questions.length} />
      <div key={animKey} style={{ display: 'flex', flexDirection: 'column', gap: 12, animation: 'fadeUp .25s ease' }}>

        {/* Infinitiv card */}
        <div style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 16, padding: '20px' }}>
          <p style={{ fontSize: 11, color: t.textSub, fontWeight: 600, letterSpacing: '.08em', textTransform: 'uppercase', marginBottom: 6 }}>Infinitiv</p>
          <p style={{ fontFamily: 'IBM Plex Mono, monospace', fontSize: 26, fontWeight: 500, color: t.text, marginBottom: 2 }}>{q.verb.infinitiv}</p>
          <p style={{ fontSize: 13, color: t.textSub }}>{q.verb.english}</p>
        </div>

        {/* Prompt */}
        <div style={{ background: t.accentSoft, border: `1.5px solid ${t.accent}`, borderRadius: 12, padding: '12px 16px' }}>
          <p style={{ fontSize: 13, fontWeight: 600, color: t.accent }}>What is the {q.form.label}?</p>
          <p style={{ fontSize: 11, color: t.accent, opacity: .7, marginTop: 2 }}>{q.form.sublabel}</p>
        </div>

        {/* Choices */}
        <div key={shakeKey} style={{ display: 'flex', flexDirection: 'column', gap: 8, animation: result === 'wrong' ? 'shake .4s ease' : 'none' }}>
          {choices.map(ch => {
            let bg = t.surface, border = t.border, color = t.text;
            if (selected === ch) {
              bg = ch === correct ? t.correctSoft : t.wrongSoft;
              border = ch === correct ? t.correct : t.wrong;
              color  = ch === correct ? t.correct : t.wrong;
            } else if (selected && ch === correct) {
              bg = t.correctSoft; border = t.correct; color = t.correct;
            }
            return (
              <button key={ch} onClick={() => handleChoice(ch)} style={{
                minHeight: 50, background: bg, border: `1.5px solid ${border}`,
                borderRadius: 12, padding: '13px 16px',
                cursor: selected ? 'default' : 'pointer',
                fontFamily: 'IBM Plex Mono, monospace', fontSize: 15, fontWeight: 500,
                color, textAlign: 'left',
                transition: 'background .2s, border-color .2s, color .2s',
              }}>{ch}</button>
            );
          })}
        </div>

        {/* Feedback */}
        {selected && (
          <div style={{ animation: 'fadeUp .2s ease', background: result === 'correct' ? t.correctSoft : t.wrongSoft, border: `1px solid ${result === 'correct' ? t.correct : t.wrong}`, borderRadius: 12, padding: '11px 16px' }}>
            <p style={{ fontSize: 13, fontWeight: 600, color: result === 'correct' ? t.correct : t.wrong }}>
              {result === 'correct' ? 'Riktig! ✓' : `Feil — correct: ${correct}`}
            </p>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── SESSION END ──────────────────────────────────────────────────────────────
function SessionEnd({ t, score, total, onBack, onAgain, label }) {
  const pct = Math.round((score / total) * 100);
  const msg = pct >= 80 ? 'Bra jobbet! 🎉' : pct >= 50 ? 'Ikke verst!' : 'Fortsett å øve!';
  return (
    <div className="content" style={{ paddingTop: 0 }}>
      <div style={{
        minHeight: 'calc(100dvh - 56px - env(safe-area-inset-top) - 56px)',
        minHeight: 'calc(100vh - 120px)',
        display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
        gap: 24, animation: 'fadeUp .4s ease', padding: '40px 0',
      }}>
        <div style={{ textAlign: 'center' }}>
          <p style={{ fontFamily: 'IBM Plex Mono, monospace', fontSize: 80, fontWeight: 500, color: t.accent, lineHeight: 1 }}>{pct}%</p>
          <p style={{ fontSize: 22, fontWeight: 700, color: t.text, marginTop: 12, letterSpacing: '-.01em' }}>{msg}</p>
          <p style={{ fontSize: 13, color: t.textSub, marginTop: 6 }}>{label}: {score} / {total}</p>
        </div>
        <div style={{ display: 'flex', gap: 10, width: '100%' }}>
          <button onClick={onBack} style={{ flex: 1, minHeight: 50, background: t.surfaceAlt, border: `1px solid ${t.border}`, borderRadius: 12, cursor: 'pointer', fontFamily: 'Sora, sans-serif', fontSize: 14, fontWeight: 500, color: t.text }}>
            Home
          </button>
          <button onClick={onAgain} style={{ flex: 1, minHeight: 50, background: t.accent, border: 'none', borderRadius: 12, cursor: 'pointer', fontFamily: 'Sora, sans-serif', fontSize: 14, fontWeight: 600, color: '#fff' }}>
            Again
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── DENSITY ─────────────────────────────────────────────────────────────────
const DENSITY = {
  compact:     { cardPad: '20px 18px', cardPadLg: '20px 18px', fontSize: 22, gap: 8  },
  comfortable: { cardPad: '28px 22px', cardPadLg: '22px 18px', fontSize: 26, gap: 12 },
  spacious:    { cardPad: '36px 26px', cardPadLg: '28px 22px', fontSize: 30, gap: 14 },
};

// ─── DATA HOOK ────────────────────────────────────────────────────────────────
function useAppData() {
  const [verbs, setVerbs] = React.useState(null);
  const [vocab, setVocab] = React.useState(null);

  React.useEffect(() => {
    async function load() {
      try {
        const [vRes, nRes] = await Promise.all([
          db.from('verbs').select('*'),
          db.from('nouns').select('*'),
        ]);
        if (vRes.error || nRes.error) throw new Error();

        const mappedVerbs = (vRes.data || []).map(r => ({
          english:           r.english    || r.English    || '',
          infinitiv:         r.infinitiv  || r.Norwegian_infinitiv || r.norwegian_infinitiv || r.Infinitiv || '',
          presens:           r.presens    || r.Presens    || '',
          preteritum:        r.preteritum || r.Preteritum || '',
          presens_perfectum: r.presens_perfectum || r.Presens_perfectum || '',
        })).filter(v => v.infinitiv);

        const mappedVocab = (nRes.data || []).map(r => ({
          english:   r.english  || r.English   || '',
          norwegian: r.norsk    || r.norwegian  || r.Norwegian || '',
          hint:      r.hint     || r.category   || '',
        })).filter(v => v.norwegian);

        setVerbs(mappedVerbs.length ? mappedVerbs : FALLBACK_VERBS);
        setVocab(mappedVocab.length ? mappedVocab : FALLBACK_VOCAB);
      } catch {
        setVerbs(FALLBACK_VERBS);
        setVocab(FALLBACK_VOCAB);
      }
    }
    load();
  }, []);

  return { verbs, vocab };
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = { theme: 'natt', exerciseMix: 'cycle', density: 'compact' };

function App() {
  const { verbs, vocab } = useAppData();
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [screen, setScreen] = React.useState('home');
  const [sessionKey, setSessionKey] = React.useState(0);
  const [settingsOpen, setSettingsOpen] = React.useState(false);
  const [sessionProgress, setSessionProgress] = React.useState(null);
  const t = THEMES[tweaks.theme] || THEMES.natt;
  const d = DENSITY[tweaks.density] || DENSITY.compact;
  const loading = !verbs || !vocab;

  // Push theme tokens to CSS custom properties so CSS classes can read them
  React.useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty('--bg',     t.bg);
    root.style.setProperty('--border', t.border);
    root.style.setProperty('--text',   t.text);
    document.querySelector('meta[name="theme-color"]')?.setAttribute('content', t.bg);
  }, [t]);

  // Close settings on Escape
  React.useEffect(() => {
    const onKey = e => { if (e.key === 'Escape') setSettingsOpen(false); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, []);

  const goHome  = () => { setScreen('home'); setSessionProgress(null); };
  const restart = () => setSessionKey(k => k + 1);
  const toggleSettings = () => setSettingsOpen(o => !o);
  const navigate = id => { setScreen(id); setSessionProgress(0); };

  const sessionLabel = screen === 'vocab-en-no' ? 'Nouns' : screen === 'verbs' ? 'Verb Forms' : '';

  if (loading) {
    return (
      <div style={{ minHeight: '100dvh', display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 12, background: '#141820' }}>
        <div style={{ width: 28, height: 28, border: '2.5px solid #2a3344', borderTop: '2.5px solid #5e9e88', borderRadius: '50%', animation: 'spin .8s linear infinite' }} />
        <p style={{ color: '#7a8496', fontFamily: 'Sora, sans-serif', fontSize: 13 }}>Loading…</p>
      </div>
    );
  }

  return (
    <>
      {/* Fixed navigation */}
      <AppHeader
        t={t}
        screen={screen}
        sessionLabel={sessionLabel}
        sessionProgress={sessionProgress}
        onBack={goHome}
        settingsOpen={settingsOpen}
        onSettingsToggle={toggleSettings}
      />

      {/* Settings panel — drops from top-right below header */}
      <TweaksPanel open={settingsOpen} onClose={() => setSettingsOpen(false)}>
        <TweakSection label="Theme">
          <TweakRadio value={tweaks.theme} onChange={v => setTweak('theme', v)}
            options={[{ value: 'natt', label: 'Natt' }, { value: 'fjord', label: 'Fjord' }, { value: 'birch', label: 'Birch' }]} />
        </TweakSection>
        <TweakSection label="Exercise Mix">
          <TweakRadio value={tweaks.exerciseMix} onChange={v => setTweak('exerciseMix', v)}
            options={[{ value: 'cycle', label: 'Cycle' }, { value: 'write', label: 'Write' }, { value: 'reveal', label: 'Reveal' }]} />
        </TweakSection>
        <TweakSection label="Card Density">
          <TweakRadio value={tweaks.density} onChange={v => setTweak('density', v)}
            options={[{ value: 'compact', label: 'Compact' }, { value: 'comfortable', label: 'Normal' }, { value: 'spacious', label: 'Spacious' }]} />
        </TweakSection>
      </TweaksPanel>

      {/* Page content — naturally scrolling */}
      {screen === 'home' && (
        <HomeScreen t={t} verbs={verbs} vocab={vocab} onNavigate={navigate} />
      )}
      {screen === 'vocab-en-no' && (
        <VocabSession
          key={sessionKey}
          t={t} vocab={vocab} exerciseMix={tweaks.exerciseMix} d={d}
          onBack={goHome} onAgain={restart}
          onProgressUpdate={setSessionProgress}
        />
      )}
      {screen === 'verbs' && (
        <VerbSession
          key={sessionKey}
          t={t} verbs={verbs}
          onBack={goHome} onAgain={restart}
          onProgressUpdate={setSessionProgress}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
